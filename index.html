<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Nave</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}
.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: space-around;
}
button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 20px;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="controls">
  <button id="left">⬅️</button>
  <button id="right">➡️</button>
  <button id="up">⬆️</button>
  <button id="down">⬇️</button>
  <button id="shoot">🔥</button>
</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height-100, size: 30 };
let bullets = [];
let enemies = [];
let enemyBullets = [];

function drawPlayer() {
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.size, player.size);
}

function drawBullets() {
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, 5, 10);
    b.y -= 5;
  });
}

function drawEnemies() {
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.fillRect(e.x, e.y, 30, 30);
    e.y += 2;

    // disparo enemigo
    if (Math.random() < 0.01) {
      enemyBullets.push({ x: e.x + 15, y: e.y });
    }
  });
}

function drawEnemyBullets() {
  ctx.fillStyle = "white";
  enemyBullets.forEach(b => {
    ctx.fillRect(b.x, b.y, 5, 10);
    b.y += 4;
  });
}

function spawnEnemies() {
  if (Math.random() < 0.02) {
    enemies.push({ x: Math.random() * canvas.width, y: 0 });
  }
}

function collision() {
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (b.x < e.x+30 && b.x+5 > e.x && b.y < e.y+30 && b.y+10 > e.y) {
        bullets.splice(bi,1);
        enemies.splice(ei,1);
      }
    });
  });

  enemyBullets.forEach((b) => {
    if (b.x < player.x+30 && b.x+5 > player.x && b.y < player.y+30 && b.y+10 > player.y) {
      alert("Game Over");
      location.reload();
    }
  });
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlayer();
  drawBullets();
  drawEnemies();
  drawEnemyBullets();
  spawnEnemies();
  collision();
  requestAnimationFrame(gameLoop);
}

// controles
let speed = 10;
document.getElementById("left").ontouchstart = () => player.x -= speed;
document.getElementById("right").ontouchstart = () => player.x += speed;
document.getElementById("up").ontouchstart = () => player.y -= speed;
document.getElementById("down").ontouchstart = () => player.y += speed;
document.getElementById("shoot").ontouchstart = () => {
  bullets.push({ x: player.x + 12, y: player.y });
};

// también teclado (opcional)
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") player.x -= speed;
  if (e.key === "ArrowRight") player.x += speed;
  if (e.key === "ArrowUp") player.y -= speed;
  if (e.key === "ArrowDown") player.y += speed;
  if (e.key === " ") bullets.push({ x: player.x + 12, y: player.y });
});

gameLoop();
</script>
</body>
</html>
