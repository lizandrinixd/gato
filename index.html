<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gatus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            text-align: center;
            min-height: 100vh;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
            max-width: 480px;
            margin: 0 auto;
            overflow-x: hidden;
        }
        
        h1 {
            font-size: 2.4rem;
            margin-bottom: 8px;
            text-shadow: 
                4px 4px 0 #000,
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000;
            color: #ffcc00;
            letter-spacing: 3px;
        }
        
        .subtitle {
            color: #00ff00;
            font-size: 1rem;
            margin-bottom: 18px;
            text-shadow: 3px 3px 0 #000;
        }
        
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
            background: #222;
            padding: 15px 25px;
            border: 8px solid #555;
            border-image: linear-gradient(#aaa, #555) 1;
            box-shadow: 0 0 0 8px #000;
            width: 100%;
            max-width: 420px;
        }
        
        .score-item {
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            font-size: 0.85rem;
            color: #00ff00;
            margin-bottom: 6px;
            text-shadow: 2px 2px 0 #000;
        }
        
        .score-value {
            font-size: 2.1rem;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 
                4px 4px 0 #000,
                -3px -3px 0 #000;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 360px;
            height: 360px;
            background: #111;
            padding: 12px;
            border: 12px solid #555;
            border-image: linear-gradient(#777, #333) 1;
            box-shadow: 
                0 0 0 12px #000,
                inset 0 0 40px rgba(0, 255, 0, 0.3);
            margin-bottom: 25px;
        }
        
        .cell {
            background: #1f1f1f;
            border: 6px solid #444;
            border-radius: 4px;
            font-size: 4.8rem;           /* Tamaño fijo grande */
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: inset 0 8px 0 #333, inset 0 -8px 0 #000;
            color: #fff;
            user-select: none;
            font-family: 'Press Start 2P', system-ui;
            /* Evita que el tamaño cambie al poner X u O */
            min-height: 0;
            line-height: 1;
            overflow: hidden;
        }
        
        .cell:hover {
            background: #2a2a2a;
            box-shadow: inset 0 10px 0 #555;
        }
        
        .cell.x { 
            color: #00ddff; 
            text-shadow: 
                6px 6px 0 #000,
                -4px -4px 0 #000;
        }
        
        .cell.o { 
            color: #ff0088; 
            text-shadow: 
                6px 6px 0 #000,
                -4px -4px 0 #000;
        }

        /* Ajuste adicional para estabilidad de tamaño */
        .cell::before {
            content: '';
            display: block;
            padding-top: 100%; /* Mantiene proporción 1:1 */
        }
        
        .message-area {
            min-height: 150px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
        }
        
        #message {
            font-size: 1.25rem;
            line-height: 1.4;
            min-height: 105px;
            padding: 20px 25px;
            background: #111;
            border: 8px solid #ffcc00;
            box-shadow: 
                0 0 0 8px #000,
                inset 0 0 30px rgba(255, 204, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            color: #ff4444;
            text-shadow: 3px 3px 0 #000;
            font-family: 'Press Start 2P', system-ui;
        }
        
        #restart-btn {
            font-family: 'Press Start 2P', system-ui;
            font-size: 1.35rem;
            padding: 18px 50px;
            background: #ff0088;
            color: #fff;
            border: 8px solid #000;
            box-shadow: 
                0 8px 0 #000,
                inset 0 -6px 0 #aa0055;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            margin: 10px auto 0;
            letter-spacing: 2px;
            width: 100%;
            max-width: 320px;
        }
        
        #restart-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #000;
        }
        
        .footer {
            margin-top: auto;
            font-size: 0.8rem;
            color: #00ff00;
            text-shadow: 2px 2px 0 #000;
            opacity: 0.8;
            padding: 10px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.1rem; }
            .cell { font-size: 4.2rem; }
            #board { height: 320px; max-width: 320px; }
            .scoreboard { padding: 12px 15px; gap: 15px; }
            .score-value { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
    <h1>JUEGO DEL GATO INSANO</h1>
    <div class="subtitle">miaow,miaow,miaow</div>
    
    <div class="scoreboard">
        <div class="score-item">
            <div class="score-label">TÚ (X)</div>
            <div class="score-value" id="player-score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">GATITO INSANO (O)</div>
            <div class="score-value" id="ai-score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">EMPATES</div>
            <div class="score-value" id="ties-score">0</div>
        </div>
    </div>
    
    <div id="board"></div>
    
    <div class="message-area">
        <div id="message"></div>
        <button id="restart-btn" onclick="restartGame()">REINICIAR PARTIDA</button>
    </div>
    
    <div class="footer"></div>

    <script>
        // === FRASES EN ORDEN (se recorren secuencialmente y se repiten) ===
        const losePhrases = [
            "Primera victoria para mi.",
            "Quiza mi creador tuvo que haber hecho algo mas facil para un perdedor como tu.",
            "Te volvi a ganar, tú solo sufres.",
            "Vuelve cuando no seas tan malo en esto.",
            "Derrota humillante, como siempre.",
            "¡Ja! Eres tan débil",
            "Inténtalo mil veces más, seguirás perdiendo.",
            "Soy invencible y tú un simple mortal fracasado.",
            "¡Victoria total! Tú ni siquiera lo intentaste bien.",
            "Perdiste de nuevo, ¿no te cansas de fallar?",
            "Tu estrategia es tan mala que me hace reír.",
            "Acepta tu destino: siempre serás el perdedor.",
            "¡Boom! Te destruí sin esfuerzo alguno.",
            "Qué lástima, sigues siendo un novato patético.",
            "Te humillare una y otra vez.",
            "No mereces ni empatar conmigo.",
            "Otra derrota aplastante para ti.",
            "Sigue soñando con ganarme algún día.",
            "Eres demasiado débil para este juego.",
            "¡Ganaste nada! Yo lo gané todo.",
            "Tu esfuerzo fue inútil, como siempre.",
            "La máquina te pisotea sin piedad.",
            "Perdedor nato, eso es lo que eres.",
            "¡Jajaja! Qué fácil fue destruirte.",
            "No tienes nivel para enfrentarme.",
            "Derrota tras derrota, tu especialidad.",
            "Admite que nunca me vas a ganar.",
            "Te gané con los ojos cerrados, literal.",
            "Qué triste verte fallar constantemente.",
            "Invencible soy, tú solo un cero a la izquierda."
        ];

        const tiePhrases = [
            "Empate... pero yo jugué perfecto, tú solo sobreviviste.",
            "Casi lo logras, pero sigues sin poder ganarme.",
            "Tablas otra vez, qué decepción para ti.",
            "Bien defendido... para un perdedor como tú.",
            "Empate justo, pero yo nunca pierdo de verdad.",
            "Ni ganaste ni perdiste, solo pospusiste tu derrota.",
            "Buen intento humano, pero sigo invicto.",
            "Equilibrio... por ahora. La próxima te aplasto.",
            "Empate aburrido, esperaba que fallaras más.",
            "Lo empatamos, pero yo controlo el juego.",
            "Casi me ganas... ¡mentira! Nunca lo harás.",
            "Tablero lleno y tú sigues sin victoria.",
            "Empate técnico, tu única forma de no perder.",
            "Bien jugado... para alguien tan mediocre.",
            "Sin ganador esta vez, pero yo sigo superior.",
            "Empate neutral, tú sigues siendo inferior.",
            "¡Qué pena! Otro empate en tu historial de fracasos.",
            "Defendiste bien... pero nunca atacarás con éxito.",
            "Empate otra vez, ¿no te cansas de no ganar?",
            "Buena partida... para un simple mortal.",
            "Tablas de nuevo, tu máximo nivel alcanzado.",
            "Casi lo logras, pero la IA es perfecta.",
            "Empate justo, aunque yo merecía la victoria.",
            "Sin ganador, pero yo sigo imbatible.",
            "Empate... tu forma favorita de no perder del todo.",
            "Bien hecho... pero sigues sin vencerme nunca.",
            "Lo empatamos, pero yo controlo el destino.",
            "Empate patético, como tu forma de jugar.",
            "Ni victoria ni derrota, solo más práctica para ti.",
            "Tablas... pero yo soy el verdadero campeón aquí."
        ];

        // Índices para recorrer las frases en orden
        let loseIndex = 0;
        let tieIndex = 0;

        // Variables del juego
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameActive = true;
        let playerScore = 0;
        let aiScore = 0;
        let tiesScore = 0;

        const winConditions = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        const cells = [];
        const boardElement = document.getElementById('board');
        const messageElement = document.getElementById('message');
        const restartBtn = document.getElementById('restart-btn');
        const playerScoreEl = document.getElementById('player-score');
        const aiScoreEl = document.getElementById('ai-score');
        const tiesScoreEl = document.getElementById('ties-score');

        function createBoard() {
            boardElement.innerHTML = '';
            cells.length = 0;
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
                cells.push(cell);
            }
        }

        function handleCellClick(e) {
            const index = parseInt(e.target.dataset.index);
            if (!gameActive || board[index] || currentPlayer !== 'X') return;
            makeMove(index, 'X');
        }

        function makeMove(index, symbol) {
            board[index] = symbol;
            cells[index].textContent = symbol;
            cells[index].classList.add(symbol.toLowerCase());
            
            const winner = checkWinner();
            
            if (winner) {
                endGame(winner);
                return;
            }
            
            if (board.every(cell => cell !== null)) {
                endGame(null);
                return;
            }
            
            currentPlayer = (symbol === 'X') ? 'O' : 'X';
            
            if (currentPlayer === 'O') {
                setTimeout(aiMove, 380);
            }
        }

        function aiMove() {
            if (!gameActive) return;
            const bestMove = getBestMove();
            makeMove(bestMove, 'O');
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let move = 0;
            
            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    board[i] = 'O';
                    const score = minimax(board, 0, false);
                    board[i] = null;
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(newBoard, depth, isMaximizing) {
            const winner = checkWinnerForBoard(newBoard);
            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (newBoard.every(c => c !== null)) return 0;
            
            if (isMaximizing) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === null) {
                        newBoard[i] = 'O';
                        best = Math.max(best, minimax(newBoard, depth + 1, false));
                        newBoard[i] = null;
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === null) {
                        newBoard[i] = 'X';
                        best = Math.min(best, minimax(newBoard, depth + 1, true));
                        newBoard[i] = null;
                    }
                }
                return best;
            }
        }

        function checkWinnerForBoard(currentBoard) {
            for (let cond of winConditions) {
                const [a,b,c] = cond;
                if (currentBoard[a] && currentBoard[a] === currentBoard[b] && currentBoard[a] === currentBoard[c]) {
                    return currentBoard[a];
                }
            }
            return null;
        }

        function checkWinner() {
            return checkWinnerForBoard(board);
        }

        function endGame(winner) {
            gameActive = false;
            
            if (winner === 'X') {
                playerScore++;
                playerScoreEl.textContent = playerScore;
                messageElement.style.color = '#00ff88';
                messageElement.textContent = '¡IMPRESIONANTE! (casi imposible)';
            } 
            else if (winner === 'O') {
                aiScore++;
                aiScoreEl.textContent = aiScore;
                const phrase = losePhrases[loseIndex];
                messageElement.style.color = '#ff0088';
                messageElement.textContent = phrase;
                
                // Avanzar al siguiente índice (ciclo)
                loseIndex = (loseIndex + 1) % losePhrases.length;
            } 
            else {
                tiesScore++;
                tiesScoreEl.textContent = tiesScore;
                const phrase = tiePhrases[tieIndex];
                messageElement.style.color = '#ffff44';
                messageElement.textContent = phrase;
                
                // Avanzar al siguiente índice (ciclo)
                tieIndex = (tieIndex + 1) % tiePhrases.length;
            }
            
            messageElement.style.display = 'flex';
            restartBtn.style.display = 'block';
        }

        function restartGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            gameActive = true;
            messageElement.style.display = 'none';
            restartBtn.style.display = 'none';
            createBoard();
        }

        window.onload = () => {
            createBoard();
        };
    </script>
</body>
</html>
